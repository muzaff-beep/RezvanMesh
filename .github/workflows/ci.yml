name: Rezvan Mesh CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --------------------------------------------------------------------------
  # Build and test Rust crates
  # --------------------------------------------------------------------------
  build-rust:
    name: Build Rust Crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        working-directory: rust
        run: cargo test --all

      - name: Build release
        working-directory: rust
        run: cargo build --release

  # --------------------------------------------------------------------------
  # Verify JNI interface consistency
  # --------------------------------------------------------------------------
  interface-check:
    name: Interface Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run interface verification script
        run: python3 scripts/verify_interfaces.py

  # --------------------------------------------------------------------------
  # Build Android APK
  # --------------------------------------------------------------------------
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [build-rust, interface-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Rust core for Android
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
          ./scripts/build_rust.sh

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            export KEYSTORE_PATH="$(pwd)/keystore.jks"
          fi
          ./gradlew assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/rezvan-mesh-release.apk

  # --------------------------------------------------------------------------
  # Integration tests on Android emulator (optional - can be skipped)
  # --------------------------------------------------------------------------
  integration-test:
    name: Integration Tests
    runs-on: macos-latest
    needs: build-apk
    if: false  # Disabled for now – re-enable when stable
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: apk/

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: |
            adb install apk/app-debug.apk
            python3 scripts/run_integration_test.py --devices emulator-5554
